spring.application.name=Star Wars API

# StarWars API
starwars.api.url=https://swapi.dev/api/planets?search=

# RestClient
restclient.pool.connection-request-timeout=1000
restclient.pool.connect-timeout=5000
restclient.pool.socket-timeout=1000
restclient.pool.max-connections=20
restclient.pool.max-per-route=6
restclient.pool.validate-after-inactivity=1
restclient.pool.retry-count=1
restclient.pool.retry-sleep-time-MS=20