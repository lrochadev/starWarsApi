spring.application.name=Star Wars API
spring.mongodb.uri=mongodb://localhost:27017/starwars_db
# RestTemplate
resttemplate.pool.connection-request-timeout=1000
resttemplate.pool.connection-timeout=5000
resttemplate.pool.socket-timeout=1000
resttemplate.pool.max-connections=20
resttemplate.pool.max-per-route=6
resttemplate.pool.validate-after-inactivity=30
resttemplate.pool.retry-count=1
resttemplate.pool.retry-sleep-time-MS=20

# StarWars API
starwars.api.url=https://swapi.dev/api/planets?search=

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=1h

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
