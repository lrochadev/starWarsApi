services:
  mongodb:
    container_name: starwars-mongodb
    image: mongo:8.0
    environment:
      - MONGO_DATA_DIR=/data/db
    volumes:
      - ./data/db:/data/db
    ports:
      - "27017:27017"
    networks:
      - production-network

