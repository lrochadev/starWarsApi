services:
  mongodb:
    container_name: starwars-mongodb
    image: mongo:8.0
    environment:
      - MONGO_DATA_DIR=/data/db
    volumes:
      - ./data/db:/data/db
    ports:
      - "27017:27017"
    networks:
      - production-network

  appserver:
    container_name: starwars-api
    build:
      context: .
    ports:
      - "8080:8080"
    networks:
      - production-network
    environment:
      SPRING_MONGODB_URI: mongodb://mongodb/starwars_db
    depends_on:
      - mongodb

networks:
  production-network:
    driver: bridge
